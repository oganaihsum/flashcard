<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>中国語フラッシュカード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #F4F1EC; min-height: 100vh; color: #1a1a1a; }
  .app { max-width: 520px; margin: 0 auto; padding: 1.25rem 1rem 5rem; }

  .header { text-align: center; margin-bottom: 1.5rem; }
  .header-badge { display: inline-flex; align-items: center; gap: 8px; background: #F5EDE9; border-radius: 20px; padding: 6px 16px; }
  .header-badge span { font-size: 13px; font-weight: 500; color: #B5614A; }

  .tab-bar { display: flex; background: #EAE6DF; border-radius: 14px; padding: 4px; margin-bottom: 1.5rem; gap: 2px; }
  .tab-btn { flex: 1; padding: 8px 0; border-radius: 10px; border: none; cursor: pointer; font-size: 13px; background: transparent; color: #888; transition: all 0.15s; font-family: inherit; }
  .tab-btn.active { background: #fff; color: #B5614A; font-weight: 500; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

  .mode-grid { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .mode-row { display: flex; gap: 6px; }
  .mode-btn { flex: 1; padding: 9px 4px; border-radius: 10px; cursor: pointer; font-size: 11px; border: 1.5px solid #E0DBD3; background: #fff; color: #888; transition: all 0.15s; font-family: inherit; text-align: center; line-height: 1.4; }
  .mode-btn .icon { font-size: 16px; display: block; margin-bottom: 2px; }
  .mode-btn.active { border-color: #B5614A; background: #F5EDE9; color: #B5614A; font-weight: 500; }

  .btn-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .filter-btn { flex: 1; padding: 6px 4px; border-radius: 8px; cursor: pointer; font-size: 11px; border: 1.5px solid #E0DBD3; background: #fff; color: #888; font-family: inherit; }
  .filter-btn.active { border-color: #6B5F8C; background: #EDEAF4; color: #6B5F8C; font-weight: 500; }

  .progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .progress-label { font-size: 12px; color: #888; }
  .streak-badge { font-size: 12px; background: #F5EDE9; color: #B5614A; padding: 2px 10px; border-radius: 10px; font-weight: 500; }
  .progress-bar-bg { height: 4px; background: #E8E3DA; border-radius: 4px; margin-bottom: 1.25rem; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #DEB9AD; border-radius: 4px; transition: width 0.3s; }

  .card { background: #fff; border: 1.5px solid #E0DBD3; border-radius: 20px; padding: 2rem 1.5rem; text-align: center; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; margin-bottom: 1rem; transition: border-color 0.2s, box-shadow 0.2s; user-select: none; }
  .card.flipped { border-color: #DEB9AD; box-shadow: 0 0 0 4px #F5EDE9; }
  .card.clickable { cursor: pointer; }
  .card-zh { font-size: 52px; font-weight: 500; letter-spacing: 4px; }
  .card-ja { font-size: 26px; font-weight: 500; line-height: 1.4; }
  .card-pinyin { font-size: 15px; color: #6B5F8C; font-weight: 500; }
  .card-hint { font-size: 13px; color: #bbb; }
  .card-divider { width: 32px; height: 1.5px; background: #DEB9AD; border-radius: 2px; margin: 4px 0; }
  .card-meanings { display: flex; flex-direction: column; gap: 6px; width: 100%; max-width: 280px; }
  .card-meaning-item { display: flex; align-items: baseline; gap: 8px; }
  .card-pos-badge { font-size: 10px; padding: 2px 7px; border-radius: 6px; background: #EDEAF4; color: #6B5F8C; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
  .card-meaning-text { font-size: 16px; font-weight: 500; color: #1a1a1a; text-align: left; }
  .card-classifier { font-size: 52px; font-weight: 500; color: #B5614A; letter-spacing: 4px; }
  .card-classifier-label { font-size: 12px; color: #888; }

  .audio-circle { width: 72px; height: 72px; border-radius: 50%; background: #EDEAF4; border: 2px solid #C4BCDC; cursor: pointer; font-size: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .audio-circle.small { width: 52px; height: 52px; font-size: 24px; }
  .speak-btn { margin-top: 4px; padding: 6px 18px; border-radius: 20px; border: 1.5px solid #6B5F8C; background: #EDEAF4; cursor: pointer; font-size: 13px; color: #6B5F8C; font-weight: 500; font-family: inherit; }

  .pinyin-card { background: #fff; border: 1.5px solid #E0DBD3; border-radius: 20px; padding: 2rem 1.5rem; text-align: center; margin-bottom: 1rem; display: flex; flex-direction: column; align-items: center; gap: 14px; transition: border-color 0.2s, box-shadow 0.2s; }
  .pinyin-card.correct { border-color: #3A7D65; box-shadow: 0 0 0 4px #E4EEEA; }
  .pinyin-card.incorrect { border-color: #B5614A; box-shadow: 0 0 0 4px #F5EDE9; }
  .pinyin-top { display: flex; align-items: center; justify-content: center; gap: 14px; }
  .pinyin-input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1.5px solid #E0DBD3; font-size: 18px; font-family: inherit; outline: none; text-align: center; background: #F9F7F4; transition: border-color 0.2s; }
  .pinyin-input:focus { border-color: #6B5F8C; background: #fff; }
  .pinyin-input.correct { border-color: #3A7D65; background: #E4EEEA; color: #3A7D65; }
  .pinyin-input.incorrect { border-color: #B5614A; background: #F5EDE9; color: #B5614A; }
  .pinyin-result { font-size: 14px; font-weight: 500; }
  .pinyin-result.correct { color: #3A7D65; }
  .pinyin-result.incorrect { color: #B5614A; }
  .pinyin-answer { font-size: 13px; color: #6B5F8C; }
  .check-btn { width: 100%; padding: 13px; border-radius: 12px; border: none; background: #6B5F8C; color: #fff; cursor: pointer; font-weight: 500; font-size: 15px; font-family: inherit; margin-bottom: 8px; }

  .example-word-badge { font-size: 11px; background: #F5EDE9; color: #B5614A; padding: 3px 10px; border-radius: 10px; font-weight: 500; }
  .example-ja { font-size: 20px; font-weight: 500; line-height: 1.5; color: #1a1a1a; }
  .example-zh { font-size: 22px; font-weight: 500; line-height: 1.5; letter-spacing: 1px; }
  .example-pinyin { font-size: 14px; color: #6B5F8C; font-weight: 500; line-height: 1.6; }
  .loading-box { display: flex; flex-direction: column; align-items: center; gap: 10px; color: #888; font-size: 14px; }
  .spinner { width: 28px; height: 28px; border: 3px solid #E0DBD3; border-top-color: #B5614A; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .mastery-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .mastery-btn { flex: 1; padding: 11px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; border: 1.5px solid #E0DBD3; background: #fff; color: #888; transition: all 0.15s; }
  .mastery-btn.learned { border-color: #3A7D65; background: #3A7D65; color: #fff; }
  .mastery-btn.unset-active { border-color: #B5614A; background: #B5614A; color: #fff; }
  .next-btn { width: 100%; padding: 15px; border-radius: 14px; border: none; background: #B5614A; color: #fff; cursor: pointer; font-weight: 500; font-size: 16px; letter-spacing: 0.5px; font-family: inherit; }
  .next-btn:active { opacity: 0.85; }

  .empty-state { text-align: center; padding: 2.5rem 1.5rem; background: #EAE6DF; border-radius: 20px; }
  .empty-icon { font-size: 40px; margin-bottom: 10px; }
  .empty-title { font-weight: 500; margin-bottom: 4px; }
  .empty-sub { font-size: 13px; color: #888; }

  .apikey-box { background: #EDEAF4; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; border: 1.5px solid #C4BCDC; }
  .apikey-title { font-size: 14px; font-weight: 500; color: #6B5F8C; margin-bottom: 6px; }
  .apikey-sub { font-size: 12px; color: #888; margin-bottom: 12px; line-height: 1.6; }
  .apikey-input { width: 100%; border-radius: 8px; border: 1px solid #C4BCDC; padding: 8px 10px; font-size: 13px; font-family: inherit; background: #fff; outline: none; margin-bottom: 8px; }
  .apikey-input:focus { border-color: #6B5F8C; }
  .apikey-save { width: 100%; padding: 9px; border-radius: 8px; border: none; background: #6B5F8C; color: #fff; cursor: pointer; font-weight: 500; font-family: inherit; }
  .apikey-clear { font-size: 11px; color: #aaa; cursor: pointer; text-decoration: underline; display: block; text-align: right; margin-top: 6px; }

  .add-btn { width: 100%; padding: 11px; border-radius: 12px; border: 1.5px dashed #DEB9AD; background: #F5EDE9; cursor: pointer; font-size: 14px; margin-bottom: 1rem; font-weight: 500; color: #B5614A; font-family: inherit; }
  .form-box { background: #EDEAF4; border-radius: 14px; padding: 1.1rem; margin-bottom: 1rem; border: 1.5px solid #C4BCDC; }
  .form-label { font-size: 11px; color: #6B5F8C; display: block; margin-bottom: 3px; font-weight: 500; margin-top: 8px; }
  .form-label:first-child { margin-top: 0; }
  .form-label-opt { font-size: 11px; color: #6B5F8C; display: block; margin-bottom: 3px; font-weight: 500; margin-top: 8px; }
  .form-label-opt::after { content: "　任意"; font-weight: 400; color: #aaa; }
  .form-input { width: 100%; border-radius: 8px; border: 1px solid #C4BCDC; padding: 7px 10px; font-size: 14px; font-family: inherit; background: #fff; outline: none; }
  .form-input:focus { border-color: #6B5F8C; }
  .meanings-section { margin-top: 8px; }
  .meanings-title { font-size: 11px; color: #6B5F8C; font-weight: 500; margin-bottom: 6px; }
  .meaning-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
  .meaning-pos-sel { font-size: 11px; padding: 5px 6px; border-radius: 6px; background: #fff; border: 1px solid #C4BCDC; color: #6B5F8C; font-family: inherit; width: 80px; flex-shrink: 0; }
  .meaning-input { flex: 1; border-radius: 8px; border: 1px solid #C4BCDC; padding: 6px 8px; font-size: 13px; font-family: inherit; background: #fff; outline: none; }
  .meaning-del { padding: 5px 8px; border-radius: 6px; border: 1px solid #FECACA; background: #FEF2F2; color: #a32d2d; cursor: pointer; font-size: 12px; font-family: inherit; flex-shrink: 0; }
  .add-meaning-btn { width: 100%; padding: 7px; border-radius: 8px; border: 1.5px dashed #C4BCDC; background: transparent; color: #6B5F8C; cursor: pointer; font-size: 12px; font-family: inherit; margin-top: 2px; }
  .form-row { display: flex; gap: 8px; margin-top: 12px; }
  .form-cancel { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #E0DBD3; background: transparent; cursor: pointer; color: #888; font-family: inherit; }
  .form-save { flex: 2; padding: 8px; border-radius: 8px; border: none; background: #6B5F8C; color: #fff; cursor: pointer; font-weight: 500; font-family: inherit; }
  .word-card { background: #fff; border: 1px solid #E0DBD3; border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px; }
  .word-info { flex: 1; }
  .word-top { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
  .word-zh { font-size: 22px; font-weight: 500; }
  .word-pinyin { font-size: 13px; color: #6B5F8C; font-weight: 500; }
  .word-classifier { font-size: 12px; color: #B5614A; background: #F5EDE9; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
  .word-meanings { margin-top: 4px; display: flex; flex-direction: column; gap: 3px; }
  .word-meaning-row { display: flex; align-items: baseline; gap: 6px; }
  .word-pos-badge { font-size: 10px; padding: 1px 6px; border-radius: 5px; background: #EDEAF4; color: #6B5F8C; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
  .word-meaning-text { font-size: 13px; color: #444; }
  .learned-badge { font-size: 10px; background: #E4EEEA; color: #3A7D65; padding: 2px 7px; border-radius: 8px; font-weight: 500; }
  .word-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
  .icon-btn { padding: 5px 9px; border-radius: 8px; cursor: pointer; font-size: 12px; font-family: inherit; white-space: nowrap; }
  .play-btn { border: 1px solid #C4BCDC; background: #EDEAF4; color: #6B5F8C; }
  .edit-btn { border: 1px solid #E0DBD3; background: transparent; color: #888; }
  .del-btn { border: 1px solid #FECACA; background: #FEF2F2; color: #a32d2d; }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const MODE_ROWS = [
  [
    { id: "cn2jp",      label: "中→日",  icon: "🀄" },
    { id: "jp2cn",      label: "日→中",  icon: "🗾" },
    { id: "audio",      label: "音声",   icon: "🔊" },
  ],
  [
    { id: "pinyin",     label: "拼音",   icon: "🔤" },
    { id: "classifier", label: "量詞",   icon: "🔢" },
    { id: "example",    label: "例文",   icon: "💬" },
  ],
];
const ALL_MODES = MODE_ROWS.flat();
const TABS = ["学習", "単語帳"];
const POS_LIST = ["名詞","動詞","形容詞","副詞","助詞","接続詞","量詞","その他"];

const SAMPLE = [
  { id: 1, chinese: "你好",  pinyin: "nǐ hǎo",   japanese: "こんにちは", meanings: [{ pos: "感動詞", text: "こんにちは" }], classifier: "" },
  { id: 2, chinese: "喜欢",  pinyin: "xǐ huān",  japanese: "好む",      meanings: [{ pos: "動詞",   text: "好む・好きだ" }], classifier: "" },
  { id: 3, chinese: "兔子",  pinyin: "tù zi",    japanese: "うさぎ",    meanings: [{ pos: "名詞",   text: "うさぎ" }],      classifier: "只" },
  { id: 4, chinese: "苹果",  pinyin: "píng guǒ", japanese: "りんご",    meanings: [{ pos: "名詞",   text: "りんご" }],      classifier: "个" },
  { id: 5, chinese: "书",    pinyin: "shū",       japanese: "本",        meanings: [{ pos: "名詞",   text: "本・書籍" }],    classifier: "本" },
];

function load(key, def) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } }
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

let state = {
  words:        load("words_v2", SAMPLE),
  mastery:      load("mastery", {}),
  exampleCache: load("exampleCache", {}),
  tab: 0, mode: "cn2jp", filter: "all",
  deck: [], cardIdx: 0, flipped: false,
  streak: load("streak", 0),
  showAdd: false, editId: null, form: newForm(),
  pinyinInput: "", pinyinResult: null,
  exampleData: null,
  apiKey: load("apiKey", ""),
  apiKeyInput: "",
};

function newForm() { return { chinese: "", pinyin: "", japanese: "", meanings: [{ pos: "名詞", text: "" }], classifier: "" }; }
function getMastery(mode, id) { return state.mastery[mode + "_" + id] || "unset"; }
function setMastery(mode, id, val) { state.mastery[mode + "_" + id] = val; save("mastery", state.mastery); }
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
function learnedCount(mode) { return state.words.filter(w => getMastery(mode, w.id) === "learned").length; }
function unlearnedCount(mode) { return state.words.filter(w => getMastery(mode, w.id) !== "learned").length; }
function normalizePinyin(s) { return s.replace(/\s+/g, "").toLowerCase(); }

function buildDeck() {
  let pool;
  if (state.mode === "classifier") pool = state.words.filter(w => w.classifier && w.classifier.trim());
  else if (state.mode === "pinyin" || state.mode === "example") pool = [...state.words];
  else if (state.filter === "unlearned") pool = state.words.filter(w => getMastery(state.mode, w.id) !== "learned");
  else if (state.filter === "review")    pool = state.words.filter(w => getMastery(state.mode, w.id) === "learned");
  else pool = state.words;
  state.deck = shuffle(pool);
  state.cardIdx = 0; state.flipped = false;
  state.pinyinInput = ""; state.pinyinResult = null;
  state.exampleData = null;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = "zh-CN"; utt.rate = 0.85;
  window.speechSynthesis.cancel(); window.speechSynthesis.speak(utt);
}

async function fetchExample(word) {
  const cacheKey = word.chinese;
  if (state.exampleCache[cacheKey]) { state.exampleData = state.exampleCache[cacheKey]; render(); return; }
  if (!state.apiKey) { state.exampleData = "nokey"; render(); return; }
  state.exampleData = "loading"; render();
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": state.apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 300,
        messages: [{
          role: "user",
          content: `以下の中国語単語を使ったHSK4級レベルの自然な例文を1つ作ってください。
単語：${word.chinese}（${word.japanese}）

以下のJSON形式のみで返してください（説明不要）：
{"zh":"中国語例文","pinyin":"拼音（スペース区切り）","ja":"日本語訳"}`
        }]
      })
    });
    const data = await res.json();
    const text = data.content[0].text.trim();
    const parsed = JSON.parse(text);
    state.exampleCache[cacheKey] = parsed;
    save("exampleCache", state.exampleCache);
    state.exampleData = parsed;
  } catch(e) {
    state.exampleData = "error";
  }
  render();
}

function render() {
  document.getElementById("app").innerHTML = `
    <div class="header"><div class="header-badge"><span>🀄 中国語フラッシュカード</span></div></div>
    <div class="tab-bar">
      ${TABS.map((t,i) => `<button class="tab-btn ${state.tab===i?"active":""}" onclick="setTab(${i})">${t}</button>`).join("")}
    </div>
    ${state.tab === 0 ? renderStudy() : renderWordList()}
  `;
  if (state.tab === 0 && state.mode === "pinyin" && state.pinyinResult === null) {
    const el = document.getElementById("pinyin-input");
    if (el) setTimeout(() => el.focus(), 50);
  }
}

function renderStudy() {
  const card = state.deck[state.cardIdx];
  const total = state.deck.length;
  const isClassifier = state.mode === "classifier";
  const isPinyin     = state.mode === "pinyin";
  const isExample    = state.mode === "example";
  const showFilter   = !isClassifier && !isPinyin && !isExample;

  return `
    <div class="mode-grid">
      ${MODE_ROWS.map(row => `
        <div class="mode-row">
          ${row.map(m => `<button class="mode-btn ${state.mode===m.id?"active":""}" onclick="setMode('${m.id}')"><span class="icon">${m.icon}</span>${m.label}</button>`).join("")}
        </div>`).join("")}
    </div>
    ${showFilter ? `
    <div class="btn-row">
      <button class="filter-btn ${state.filter==="all"?"active":""}" onclick="setFilter('all')">全部 (${state.words.length})</button>
      <button class="filter-btn ${state.filter==="unlearned"?"active":""}" onclick="setFilter('unlearned')">未習得 (${unlearnedCount(state.mode)})</button>
      <button class="filter-btn ${state.filter==="review"?"active":""}" onclick="setFilter('review')">復習 (${learnedCount(state.mode)})</button>
    </div>` : ""}
    ${total === 0 ? `
      <div class="empty-state">
        <div class="empty-icon">${isClassifier?"🔢":"✨"}</div>
        <p class="empty-title">${isClassifier?"量詞が登録された単語がありません":state.filter==="unlearned"?"未習得の単語がありません！":state.filter==="review"?"「覚えた」単語がまだありません":"単語が登録されていません"}</p>
        <p class="empty-sub">${isClassifier?"単語帳タブで量詞を登録してください":state.filter==="unlearned"?"全部モードで復習しましょう 🎉":"単語帳タブから追加してください"}</p>
      </div>` : `
    <div class="progress-row">
      <span class="progress-label">${state.cardIdx+1} / ${total}</span>
      ${state.streak > 0 ? `<span class="streak-badge">🔥 ${state.streak} 連続</span>` : ""}
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${((state.cardIdx+1)/total)*100}%"></div></div>
    ${isPinyin ? renderPinyinMode(card) : isExample ? renderExampleMode(card) : renderFlipMode(card)}
  `}`;
}

function renderFlipMode(card) {
  if (!card) return "";
  const isClassifier = state.mode === "classifier";
  return `
    <div class="card ${state.flipped?"flipped":"clickable"}" onclick="${!state.flipped?"flipCard()":""}">
      ${renderCardContent(card)}
    </div>
    ${state.flipped && !isClassifier ? `
      <div class="mastery-row">
        <button class="mastery-btn ${getMastery(state.mode,card.id)==="learned"?"learned":""}" onclick="handleMastery('learned')">✨ 覚えた！</button>
        <button class="mastery-btn ${getMastery(state.mode,card.id)==="unset"?"unset-active":""}" onclick="handleMastery('unset')">😅 まだ覚えてない</button>
      </div>` : ""}
    ${state.flipped ? `<button class="next-btn" onclick="nextCard()">次の単語 →</button>` : ""}
  `;
}

function renderPinyinMode(card) {
  if (!card) return "";
  const result = state.pinyinResult;
  const answered = result !== null;
  return `
    <div class="pinyin-card ${result||""}">
      <div class="pinyin-top">
        <button class="audio-circle" onclick="speak('${card.chinese}')">🔊</button>
        <span style="font-size:48px;font-weight:500;letter-spacing:4px">${card.chinese}</span>
      </div>
      <div style="font-size:14px;color:#888">${card.japanese}</div>
      <input id="pinyin-input" class="pinyin-input ${result||""}" type="text" placeholder="拼音を入力…"
        value="${state.pinyinInput}" oninput="onPinyinInput(this.value)" onkeydown="onPinyinKey(event)" ${answered?"readonly":""}>
      ${answered ? `
        <div class="pinyin-result ${result}">${result==="correct"?"✓ 正解！":"✗ 不正解"}</div>
        ${result==="incorrect" ? `<div class="pinyin-answer">正しい拼音：${card.pinyin}</div>` : ""}
      ` : ""}
    </div>
    ${!answered
      ? `<button class="check-btn" onclick="checkPinyin()">確認する</button>`
      : `<button class="next-btn" onclick="nextCard()">次の単語 →</button>`}
  `;
}

function renderExampleMode(card) {
  if (!card) return "";
  const d = state.exampleData;
  if (!state.apiKey) return `
    <div class="apikey-box">
      <div class="apikey-title">🔑 Anthropic APIキーを入力</div>
      <div class="apikey-sub">例文はClaudeが自動生成します。APIキーはこのデバイスにのみ保存されます。<br>取得先：console.anthropic.com → API Keys</div>
      <input class="apikey-input" type="password" placeholder="sk-ant-..." oninput="state.apiKeyInput=this.value" onkeydown="if(event.key==='Enter')saveApiKey()">
      <button class="apikey-save" onclick="saveApiKey()">保存して始める</button>
    </div>`;

  if (!state.flipped) return `
    <div class="card clickable" onclick="flipAndFetchExample()">
      <span class="example-word-badge">${card.chinese}（${card.japanese}）を使った例文</span>
      <span class="card-hint">タップして例文を生成</span>
    </div>`;

  return `
    <div class="card flipped" style="gap:14px">
      ${d === "loading" ? `<div class="loading-box"><div class="spinner"></div><span>例文を生成中…</span></div>` :
        d === "error"   ? `<span style="color:#B5614A;font-size:14px">生成に失敗しました。もう一度お試しください。</span>` :
        d && d.zh ? `
          <span class="example-word-badge">${card.chinese}（${card.japanese}）</span>
          <span class="example-ja">${d.ja}</span>
          <div class="card-divider"></div>
          <span class="example-zh">${d.zh}</span>
          <span class="example-pinyin">${d.pinyin}</span>
          <button class="speak-btn" onclick="event.stopPropagation();speak('${(d.zh||"").replace(/'/g,"\\'")}')">▶ 発音を聞く</button>
        ` : ""}
    </div>
    <button class="next-btn" onclick="nextCard()">次の単語 →</button>
  `;
}

function renderMeanings(meanings) {
  if (!meanings || meanings.length === 0) return "";
  return `<div class="card-meanings">${meanings.map(m=>`<div class="card-meaning-item"><span class="card-pos-badge">${m.pos}</span><span class="card-meaning-text">${m.text}</span></div>`).join("")}</div>`;
}

function renderCardContent(card) {
  if (!card) return "";
  const hm = card.meanings && card.meanings.length > 0;
  if (state.mode === "classifier") {
    if (!state.flipped) return `<span class="card-zh">${card.chinese}</span><span class="card-pinyin">${card.pinyin}</span><span class="card-hint">量詞は？　タップして確認</span>`;
    return `<span class="card-zh">${card.chinese}</span><div class="card-divider"></div><span class="card-classifier-label">量詞</span><span class="card-classifier">${card.classifier}</span><button class="speak-btn" onclick="event.stopPropagation();speak('${card.classifier}${card.chinese}')">▶ 発音を聞く</button>`;
  }
  if (!state.flipped) {
    if (state.mode === "audio") return `<button class="audio-circle" onclick="event.stopPropagation();speak('${card.chinese}')">🔊</button><span class="card-hint">音声を聞いて、タップして答えを見る</span>`;
    if (state.mode === "cn2jp") return `<span class="card-zh">${card.chinese}</span><span class="card-hint">タップして答えを見る</span>`;
    return `<span class="card-ja">${card.japanese}</span><span class="card-hint">タップして答えを見る</span>`;
  }
  if (state.mode === "audio") return `<button class="audio-circle small" onclick="event.stopPropagation();speak('${card.chinese}')">🔊</button><span class="card-zh">${card.chinese}</span><span class="card-pinyin">${card.pinyin}</span>${hm?renderMeanings(card.meanings):`<span style="font-size:22px;font-weight:500">${card.japanese}</span>`}`;
  if (state.mode === "cn2jp") return `<span class="card-zh">${card.chinese}</span><span class="card-pinyin">${card.pinyin}</span>${hm?renderMeanings(card.meanings):`<span style="font-size:22px;font-weight:500">${card.japanese}</span>`}<button class="speak-btn" onclick="event.stopPropagation();speak('${card.chinese}')">▶ 発音を聞く</button>`;
  return `<span class="card-ja">${card.japanese}</span><div class="card-divider"></div><span class="card-zh">${card.chinese}</span><span class="card-pinyin">${card.pinyin}</span><button class="speak-btn" onclick="event.stopPropagation();speak('${card.chinese}')">▶ 発音を聞く</button>`;
}

function renderWordList() {
  const f = state.form;
  return `
    <button class="add-btn" onclick="openAdd()">＋ 単語を追加</button>
    ${state.showAdd ? `
    <div class="form-box">
      <label class="form-label">中国語（漢字）</label>
      <input class="form-input" value="${f.chinese}" placeholder="兔子" oninput="updateForm('chinese',this.value)">
      <label class="form-label">拼音</label>
      <input class="form-input" value="${f.pinyin}" placeholder="tù zi" oninput="updateForm('pinyin',this.value)">
      <div class="meanings-section">
        <div class="meanings-title">意味</div>
        ${(f.meanings||[]).map((m,i) => `
          <div class="meaning-row">
            <select class="meaning-pos-sel" onchange="updateMeaningPos(${i},this.value)">
              ${POS_LIST.map(p=>`<option value="${p}" ${m.pos===p?"selected":""}>${p}</option>`).join("")}
            </select>
            <input class="meaning-input" value="${m.text}" placeholder="意味を入力" oninput="updateMeaningText(${i},this.value)">
            <button class="meaning-del" onclick="removeMeaning(${i})">✕</button>
          </div>`).join("")}
        <button class="add-meaning-btn" onclick="addMeaning()">＋ 意味を追加</button>
      </div>
      <label class="form-label-opt">量詞</label>
      <input class="form-input" value="${f.classifier||""}" placeholder="只・个・本 など" oninput="updateForm('classifier',this.value)">
      <div class="form-row">
        <button class="form-cancel" onclick="closeAdd()">キャンセル</button>
        <button class="form-save" onclick="saveWord()">${state.editId!==null?"保存":"追加"}</button>
      </div>
    </div>` : ""}
    ${state.words.length===0?`<p style="text-align:center;color:#888">単語がありません</p>`:""}
    ${state.words.map(w => {
      const hm = w.meanings && w.meanings.length > 0;
      const lm = ALL_MODES.filter(m=>!["classifier","pinyin","example"].includes(m.id)&&getMastery(m.id,w.id)==="learned").map(m=>m.icon).join("");
      return `
      <div class="word-card">
        <div class="word-info">
          <div class="word-top">
            <span class="word-zh">${w.chinese}</span>
            <span class="word-pinyin">${w.pinyin}</span>
            ${w.classifier?`<span class="word-classifier">量詞: ${w.classifier}</span>`:""}
            ${lm?`<span class="learned-badge">覚えた ${lm}</span>`:""}
          </div>
          ${hm?`<div class="word-meanings">${w.meanings.map(m=>`<div class="word-meaning-row"><span class="word-pos-badge">${m.pos}</span><span class="word-meaning-text">${m.text}</span></div>`).join("")}</div>`:`<div style="font-size:13px;color:#888;margin-top:3px">${w.japanese}</div>`}
        </div>
        <div class="word-actions">
          <button class="icon-btn play-btn" onclick="speak('${w.chinese}')">▶</button>
          <button class="icon-btn edit-btn" onclick="editWord(${w.id})">編集</button>
          <button class="icon-btn del-btn" onclick="deleteWord(${w.id})">削除</button>
        </div>
      </div>`;
    }).join("")}
    ${state.apiKey ? `<span class="apikey-clear" onclick="clearApiKey()">APIキーをリセット</span>` : ""}
  `;
}

function setTab(i) { state.tab=i; render(); }
function setMode(m) { state.mode=m; buildDeck(); render(); }
function setFilter(f) { state.filter=f; buildDeck(); render(); }
function flipCard() { state.flipped=true; render(); }
function flipAndFetchExample() { state.flipped=true; const card=state.deck[state.cardIdx]; if(card) fetchExample(card); }
function handleMastery(val) { const card=state.deck[state.cardIdx]; if(!card)return; setMastery(state.mode,card.id,val); render(); }
function nextCard() {
  state.cardIdx++;
  if(state.cardIdx>=state.deck.length) buildDeck();
  state.flipped=false; state.pinyinInput=""; state.pinyinResult=null; state.exampleData=null;
  render();
}
function onPinyinInput(val) { state.pinyinInput=val; }
function onPinyinKey(e) { if(e.key==="Enter") checkPinyin(); }
function checkPinyin() {
  const card=state.deck[state.cardIdx]; if(!card||state.pinyinResult!==null) return;
  state.pinyinResult=normalizePinyin(state.pinyinInput)===normalizePinyin(card.pinyin)?"correct":"incorrect";
  render();
}
function saveApiKey() {
  const key=(state.apiKeyInput||document.querySelector(".apikey-input")?.value||"").trim();
  if(!key) return;
  state.apiKey=key; save("apiKey",state.apiKey); render();
}
function clearApiKey() {
  if(!confirm("APIキーをリセットしますか？")) return;
  state.apiKey=""; save("apiKey",""); render();
}
function openAdd() { state.showAdd=true; state.editId=null; state.form=newForm(); render(); }
function closeAdd() { state.showAdd=false; state.editId=null; render(); }
function updateForm(key,val) { state.form[key]=val; }
function updateMeaningPos(i,val) { state.form.meanings[i].pos=val; }
function updateMeaningText(i,val) { state.form.meanings[i].text=val; }
function addMeaning() { state.form.meanings.push({pos:"名詞",text:""}); render(); }
function removeMeaning(i) { state.form.meanings.splice(i,1); render(); }
function saveWord() {
  const f=state.form;
  if(!f.chinese||!f.pinyin) return;
  const meanings=(f.meanings||[]).filter(m=>m.text.trim()!=="");
  if(!meanings.length) return;
  const japanese=meanings[0].text;
  const classifier=(f.classifier||"").trim();
  if(state.editId!==null) { state.words=state.words.map(w=>w.id===state.editId?{...w,...f,japanese,meanings,classifier}:w); state.editId=null; }
  else { state.words.push({id:Date.now(),...f,japanese,meanings,classifier}); }
  save("words_v2",state.words);
  state.form=newForm(); state.showAdd=false; buildDeck(); render();
}
function editWord(id) {
  const w=state.words.find(w=>w.id===id); if(!w)return;
  state.form={chinese:w.chinese,pinyin:w.pinyin,japanese:w.japanese,meanings:w.meanings?[...w.meanings.map(m=>({...m}))]:[],classifier:w.classifier||""};
  state.editId=id; state.showAdd=true; render();
}
function deleteWord(id) {
  if(!confirm("削除しますか？"))return;
  state.words=state.words.filter(w=>w.id!==id); save("words_v2",state.words); buildDeck(); render();
}

buildDeck(); render();
</script>
</body>
</html>
